services:
  - type: web
    name: clinsearch-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://clinsearch.vercel.app
      - key: BACKEND_URL
        value: https://clinsearch-api.onrender.com
      - key: CLINSEARCH_DB_PATH
        value: /var/data/clinsearch.db
      - key: PUBMED_API_KEY
        sync: false
      - key: PUBMED_EMAIL
        value: api@clinsearch.app
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
